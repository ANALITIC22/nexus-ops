<!--
  COMPONENTE: Header
  Archivo: components/header.html
-->

<div class="header-title" id="headerTitle">Dashboard</div>

<div class="header-search">
  <span class="search-icon">⌕</span>
  <input type="text" placeholder="Buscar matrices, tareas, reportes..." id="globalSearch">
</div>

<div class="header-right">
  <div class="header-datetime">
    <div class="header-time" id="liveClock">00:00:00</div>
    <div class="header-date" id="liveDate">Cargando...</div>
  </div>

  <div class="header-divider"></div>

  <button class="icon-btn" onclick="toggleNotif()" style="position:relative" aria-label="Notificaciones">
    🔔
    <span class="notif-dot" style="display:none"></span>
    <span id="notifBadge" style="
      display:none;position:absolute;top:-4px;right:-4px;
      background:#BC6C25;color:#fff;border-radius:50%;
      width:16px;height:16px;font-size:9px;font-weight:700;
      line-height:16px;text-align:center;
    "></span>
  </button>

  <button class="icon-btn" onclick="showToast('Función disponible próximamente','warning')">
    ⊕
  </button>

  <div class="header-avatar" onclick="navigate('perfil',null)">AC</div>
</div>
