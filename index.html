<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXUS OPS — Panel Ejecutivo</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <link rel="stylesheet" href="assets/style.css">
</head>
<body style="overflow:hidden">

<!-- LOGIN SCREEN -->
<div id="login-root"></div>

<!-- Mobile sidebar overlay backdrop -->
<div class="mobile-sidebar-overlay" id="mobileSidebarOverlay" onclick="closeMobileSidebar()"></div>

<!-- EXEC PANEL -->
<div class="exec-layout">
  <aside class="exec-sidebar" id="sidebar-root"></aside>
  <header class="exec-header" id="header-root"></header>

  <main class="exec-main" id="main-root">
    <!-- Loading overlay — visible hasta que Firebase entregue datos -->
    <div id="loadingOverlay" class="loading-state">
      <div class="loading-spinner"></div>
      <div style="font-size:14px;font-weight:500;color:var(--deep)">Conectando con Firebase...</div>
      <div style="font-size:12px;color:var(--text-m);margin-top:4px">Cargando datos en tiempo real</div>
    </div>
    <!-- Las páginas se inyectan aquí por loader.js -->
  </main>

  <!-- Páginas del Gerente (fuera de exec-main, dentro del grid) -->
  <div id="gerente-pages-root"></div>

  <!-- Modales -->
  <div id="modals-root"></div>
</div><!-- /exec-layout -->

<!-- Mobile nav bar -->
<div id="mobile-root"></div>

<!-- Toast container -->
<div class="toast-container" id="toastContainer"></div>

<!-- SCRIPTS — orden crítico -->
<script src="assets/loader.js"></script>
<script src="js/login.js"></script>
<script src="js/mobile-nav.js"></script>
<script type="module" src="js/app.js"></script>

</body>
</html>
