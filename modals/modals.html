<div id="modalPeticion" class="modal-overlay" style="display:none">
    <div class="modal-box">
      <div class="modal-title">📋 Nueva Petición</div>
      <div class="modal-sub">Esta petición será registrada y visible para el administrador en la matriz seleccionada.</div>

      <label class="modal-label">Nombre Completo <span style="color:var(--red)">*</span></label>
      <input class="modal-input" id="peticionNombre" type="text" placeholder="Ej: María González Rodríguez" autocomplete="off">
      <div class="modal-error" id="peticionNombreError">⚠ El nombre completo es obligatorio</div>

      <label class="modal-label">Título de la Petición <span style="color:var(--red)">*</span></label>
      <input class="modal-input" id="peticionTitulo" type="text" placeholder="Describa brevemente su petición..." autocomplete="off">
      <div class="modal-error" id="peticionTituloError">⚠ El título es obligatorio</div>

      <label class="modal-label">Detalle / Descripción</label>
      <textarea class="modal-textarea" id="peticionDesc" placeholder="Información adicional sobre la petición (opcional)..."></textarea>

      <label class="modal-label">Prioridad</label>
      <select class="modal-input" id="peticionPrioridad" style="margin-bottom:18px;cursor:pointer">
        <option value="Media">Media</option>
        <option value="Alta">Alta</option>
        <option value="Baja">Baja</option>
      </select>

      <div class="modal-footer">
        <button class="btn-modal-cancel" onclick="cerrarModalPeticion()">Cancelar</button>
        <button class="btn-modal-submit" id="btnEnviarPeticion" onclick="enviarPeticion()">Enviar Petición</button>
      </div>
    </div>
  </div>
  <!-- ============================================================ GERENTE CRUD MODAL -->
  <div id="modalGerenteOverlay" onclick="if(event.target===this)closeGMModal()">
    <div class="gerente-modal-box" id="gmModalBox">
      <div class="gerente-modal-title" id="gmModalTitle">Nueva Matriz</div>
      <div id="gmModalBody"><!-- dynamic --></div>
      <div class="gm-footer">
        <button class="btn-gerente-outline" onclick="closeGMModal()">Cancelar</button>
        <button class="btn-gerente" id="gmSaveBtn" onclick="saveGMModal()">Guardar</button>
      </div>
    </div>
  </div>
