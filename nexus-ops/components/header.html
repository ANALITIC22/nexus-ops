<!--
  COMPONENTE: Header
  Archivo: components/header.html
  Inyectado en: #header-root (index.html)
-->

<div class="header-title" id="headerTitle">Dashboard</div>

<div class="header-search">
  <span class="search-icon">⌕</span>
  <input type="text" placeholder="Buscar matrices, tareas, reportes..." id="globalSearch">
</div>

<div class="header-right">
  <div class="header-datetime">
    <div class="header-time" id="liveClock">00:00:00</div>
    <div class="header-date" id="liveDate">Cargando...</div>
  </div>

  <div class="header-divider"></div>

  <button class="icon-btn" onclick="toggleNotif()">
    🔔
    <span class="notif-dot"></span>
  </button>

  <button class="icon-btn" onclick="showToast('Función disponible próximamente','warning')">
    ⊕
  </button>

  <div class="header-avatar" onclick="navigate('perfil',null)">AC</div>
</div>
