<!--
  COMPONENTE: Panel de Notificaciones
  Archivo: components/notifications.html
  Inyectado en: #notif-root (index.html)
-->

<div class="notif-panel" id="notifPanel">
  <div class="notif-header">
    <div class="notif-title">Notificaciones</div>
    <button class="btn btn-ghost btn-sm" onclick="toggleNotif()">✕</button>
  </div>
  <div class="notif-item">
    <div class="notif-dot-indicator"></div>
    <div>
      <div class="notif-text">Tarea crítica: Actualización SAP pendiente</div>
      <div class="notif-time">Hace 15 min</div>
    </div>
  </div>
</div>
